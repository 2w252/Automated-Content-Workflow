<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Autopilot | Content Automation Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
            mono: ['Share Tech Mono', 'monospace'],
          },
          colors: {
            brand: {
              black: '#07080e',
              dark: '#0e111d',
              card: '#161b2e',
              accent: '#00f5d4',
              purple: '#7b2cbf',
              pink: '#ff007f',
            }
          }
        }
      }
    }
  </script>
  <style>
    .bg-synth-grid {
      background-image: 
        radial-gradient(circle at 10% 15%, rgba(0, 245, 212, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, rgba(123, 44, 191, 0.06) 0%, transparent 45%);
    }

    .spring-transition {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s ease;
    }

    .depth-base {
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    }
    .depth-elevated {
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .depth-floating {
      box-shadow: 0 10px 30px rgba(0,245,212,0.1), 0 1px 0 rgba(255,255,255,0.05);
    }
  </style>
</head>
<body class="bg-brand-black text-slate-200 min-h-screen flex flex-col items-center justify-center bg-synth-grid relative overflow-hidden">

  <!-- SVG Noise Filter for Grain/Texture -->
  <svg class="absolute inset-0 w-full h-full opacity-[0.015] pointer-events-none z-50" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <div class="container w-full max-w-[1100px] p-4 z-10 flex flex-col gap-4">
    <header class="flex justify-between items-center border-b-2 border-brand-accent/20 pb-2">
      <div>
        <h1 class="font-display text-2xl font-extrabold tracking-[-0.03em] uppercase bg-gradient-to-r from-brand-accent to-brand-purple bg-clip-text text-transparent">AI Content Autopilot</h1>
        <p class="font-mono text-[10px] text-brand-accent tracking-widest uppercase">Автопилот новостей Habr ➡️ Telegram</p>
      </div>
    </header>

    <div class="dashboard-grid grid grid-cols-1 lg:grid-cols-3 gap-4">
      
      <!-- Config Panel -->
      <div class="panel bg-brand-dark border-t-3 border-brand-accent rounded-lg p-5 depth-elevated flex flex-col gap-4">
        <h2 class="font-mono text-xs tracking-widest text-brand-accent uppercase border-b border-white/5 pb-1">Настройки</h2>
        <div class="form-group flex flex-col gap-1">
          <label class="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">Telegram Bot Token</label>
          <input type="password" id="bot-token" placeholder="123456:ABC-DEF..." class="bg-brand-card border border-white/5 text-slate-200 py-2 px-3 rounded text-sm spring-transition focus:border-brand-accent">
        </div>
        <div class="form-group flex flex-col gap-1">
          <label class="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">Telegram Channel ID</label>
          <input type="text" id="channel-id" placeholder="@my_channel" class="bg-brand-card border border-white/5 text-slate-200 py-2 px-3 rounded text-sm spring-transition focus:border-brand-accent">
        </div>
        <div class="form-group flex flex-col gap-1">
          <label class="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">RSS URL</label>
          <input type="text" id="rss-url" value="https://habr.com/ru/rss/best/daily/" class="bg-brand-card border border-white/5 text-slate-200 py-2 px-3 rounded text-sm spring-transition focus:border-brand-accent">
        </div>
        <div class="form-group flex flex-col gap-1">
          <label class="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">Gemini API Key (Опционально)</label>
          <input type="password" id="gemini-key" placeholder="AIzaSy..." class="bg-brand-card border border-white/5 text-slate-200 py-2 px-3 rounded text-sm spring-transition focus:border-brand-accent">
        </div>
        <button class="btn bg-gradient-to-r from-brand-accent to-brand-purple text-black font-extrabold text-xs uppercase tracking-wider py-3 rounded spring-transition hover:-translate-y-0.5 hover:shadow-[0_0_15px_rgba(0,245,212,0.3)]" id="save-config-btn">Сохранить</button>
      </div>

      <!-- RSS Feed Panel -->
      <div class="panel bg-brand-dark border-t-3 border-brand-purple rounded-lg p-5 depth-elevated flex flex-col gap-4">
        <h2 class="font-mono text-xs tracking-widest text-brand-purple uppercase border-b border-white/5 pb-1">Лента RSS</h2>
        <button class="btn bg-brand-card border border-white/5 text-brand-accent font-extrabold text-xs uppercase tracking-wider py-3 rounded spring-transition hover:border-brand-accent hover:text-white" id="fetch-news-btn">Загрузить ленту</button>
        <div class="news-list flex flex-col gap-2 max-h-[320px] overflow-y-auto pr-1" id="news-list">
          <div class="text-center text-xs text-slate-500 py-10">Нажмите «Загрузить ленту» для старта</div>
        </div>
      </div>

      <!-- Preview and Action Panel -->
      <div class="panel bg-brand-dark border-t-3 border-brand-pink rounded-lg p-5 depth-elevated flex flex-col gap-4">
        <h2 class="font-mono text-xs tracking-widest text-brand-pink uppercase border-b border-white/5 pb-1">Превью и Публикация</h2>
        <div class="flex flex-col gap-2 flex-grow">
          <label class="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">Макет сообщения в Telegram</label>
          <div class="preview-box bg-[#182533] rounded-lg p-4 text-xs font-sans text-slate-200 whitespace-pre-wrap max-h-[220px] overflow-y-auto border border-white/5 line-relaxed depth-base flex-grow" id="post-preview">
Выбранный пост появится здесь...
          </div>
        </div>
        <button class="btn bg-gradient-to-r from-brand-accent to-brand-purple text-black font-extrabold text-xs uppercase tracking-wider py-3 rounded spring-transition hover:-translate-y-0.5 hover:shadow-[0_0_15px_rgba(0,245,212,0.3)] disabled:bg-neutral-800 disabled:text-neutral-500 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none" id="generate-btn" disabled>Сгенерировать пост с ИИ</button>
        <button class="btn bg-gradient-to-r from-cyan-500 to-sky-600 text-white font-extrabold text-xs uppercase tracking-wider py-3 rounded spring-transition hover:-translate-y-0.5 hover:shadow-[0_0_15px_rgba(0,136,204,0.4)] disabled:bg-neutral-800 disabled:text-neutral-500 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none" id="post-btn" disabled>Опубликовать в Telegram</button>
      </div>

      <!-- Console logs panel -->
      <div class="console-panel lg:col-span-3 bg-brand-dark border-t-3 border-brand-accent rounded-lg p-5 depth-elevated flex flex-col gap-3">
        <h2 class="font-mono text-xs tracking-widest text-brand-accent uppercase border-b border-white/5 pb-1">Терминал операций</h2>
        <div class="console bg-[#050608] rounded-md p-4 h-[120px] overflow-y-auto font-mono text-xs text-green-400 flex flex-col gap-1.5 depth-base" id="console-logs">
          [SYSTEM] Терминал готов к работе. Заполните настройки и загрузите ленту новостей.
        </div>
      </div>

    </div>
  </div>

  <script>
    const botTokenInput = document.getElementById('bot-token');
    const channelIdInput = document.getElementById('channel-id');
    const rssUrlInput = document.getElementById('rss-url');
    const geminiKeyInput = document.getElementById('gemini-key');
    const saveBtn = document.getElementById('save-config-btn');
    const fetchNewsBtn = document.getElementById('fetch-news-btn');
    const newsListDiv = document.getElementById('news-list');
    const generateBtn = document.getElementById('generate-btn');
    const postBtn = document.getElementById('post-btn');
    const postPreview = document.getElementById('post-preview');
    const consoleLogs = document.getElementById('console-logs');

    let loadedNews = [];
    let selectedNewsItem = null;
    let generatedPostText = '';

    botTokenInput.value = localStorage.getItem('tg_bot_token') || '';
    channelIdInput.value = localStorage.getItem('tg_channel_id') || '';
    rssUrlInput.value = localStorage.getItem('rss_url') || 'https://habr.com/ru/rss/best/daily/';
    geminiKeyInput.value = localStorage.getItem('gemini_api_key') || '';

    saveBtn.addEventListener('click', () => {
      localStorage.setItem('tg_bot_token', botTokenInput.value);
      localStorage.setItem('tg_channel_id', channelIdInput.value);
      localStorage.setItem('rss_url', rssUrlInput.value);
      localStorage.setItem('gemini_api_key', geminiKeyInput.value);
      logConsole('[SYSTEM] Конфигурация успешно сохранена в localStorage.');
    });

    function logConsole(message) {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.textContent = `[${time}] ${message}`;
      consoleLogs.appendChild(div);
      consoleLogs.scrollTop = consoleLogs.scrollHeight;
    }

    fetchNewsBtn.addEventListener('click', async () => {
      const rssUrl = rssUrlInput.value;
      if (!rssUrl) {
        logConsole('[ОШИБКА] Укажите корректный RSS URL.');
        return;
      }

      logConsole(`[RSS] Загрузка новостей по адресу: ${rssUrl}...`);
      newsListDiv.innerHTML = '<div class="text-center text-xs text-slate-500 py-10">Загрузка новостей...</div>';

      try {
        let xmlText = '';
        let success = false;

        try {
          logConsole('[RSS] Пробуем прокси-сервер 1 (corsproxy.io)...');
          const response = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`);
          if (!response.ok) throw new Error('corsproxy.io failed');
          xmlText = await response.text();
          success = true;
        } catch (e) {
          logConsole(`[RSS] Прокси-сервер 1 недоступен (${e.message}). Пробуем прокси-сервер 2...`);
        }

        if (!success) {
          try {
            logConsole('[RSS] Пробуем прокси-сервер 2 (codetabs.com)...');
            const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rssUrl)}`);
            if (!response.ok) throw new Error('codetabs failed');
            xmlText = await response.text();
            success = true;
          } catch (e) {
            logConsole(`[RSS] Прокси-сервер 2 недоступен (${e.message}). Пробуем прокси-сервер 3...`);
          }
        }

        if (!success) {
          try {
            logConsole('[RSS] Пробуем прокси-сервер 3 (allorigins.win)...');
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
            if (!response.ok) throw new Error('allorigins failed');
            const data = await response.json();
            xmlText = data.contents;
            success = true;
          } catch (e) {
            logConsole(`[RSS] Прокси-сервер 3 недоступен (${e.message}).`);
            throw new Error('Все прокси-сервера CORS вернули ошибку.');
          }
        }

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        
        const items = xmlDoc.querySelectorAll("item");
        loadedNews = [];
        newsListDiv.innerHTML = '';

        if (items.length === 0) {
          throw new Error('В полученном XML отсутствуют элементы <item>.');
        }

        items.forEach((item, index) => {
          if (index >= 15) return;
          const title = item.querySelector("title")?.textContent || "Без заголовка";
          const link = item.querySelector("link")?.textContent || "#";
          const desc = item.querySelector("description")?.textContent || "";
          const cleanDesc = desc.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 150) + "...";

          loadedNews.push({ title, link, desc: cleanDesc });

          const card = document.createElement('div');
          card.className = 'news-card bg-brand-black/20 border border-white/5 rounded p-3 cursor-pointer spring-transition hover:border-brand-accent hover:bg-brand-accent/5';
          card.innerHTML = `
            <h3 class="text-xs font-semibold text-white mb-1 leading-normal">${title}</h3>
            <p class="text-[11px] text-slate-400 line-clamp-2 leading-relaxed">${cleanDesc}</p>
          `;
          
          card.addEventListener('click', () => {
            document.querySelectorAll('.news-card').forEach(c => c.classList.remove('border-brand-accent', 'bg-brand-accent/5'));
            card.classList.add('border-brand-accent', 'bg-brand-accent/5');
            selectedNewsItem = loadedNews[index];
            generateBtn.disabled = false;
            logConsole(`[ВЫБОР] Выбрана статья: "${title}"`);
          });

          newsListDiv.appendChild(card);
        });

        logConsole(`[RSS] Успешно загружено ${loadedNews.length} статей.`);

      } catch (err) {
        logConsole(`[ОШИБКА RSS] Не удалось прочитать ленту: ${err.message}`);
        newsListDiv.innerHTML = `<div class="text-xs p-3 border border-dashed border-red-500 text-red-400 rounded text-center">Ошибка загрузки RSS.<br><br>Причина: ${err.message}</div>`;
      }
    });

    generateBtn.addEventListener('click', async () => {
      if (!selectedNewsItem) return;

      const apiKey = geminiKeyInput.value;
      const prompt = `Сделай короткий вовлекающий пост для Telegram-канала на основе этой новости. Добавь смайлики и тематические хэштеги в конце. Сделай текст интересным и легким для чтения.\n\nЗаголовок: ${selectedNewsItem.title}\n\nОписание: ${selectedNewsItem.desc}\n\nСсылка: ${selectedNewsItem.link}`;

      postPreview.textContent = 'ИИ анализирует новость и пишет пост...';
      generateBtn.disabled = true;

      if (apiKey) {
        logConsole('[GEMINI] Запуск генерации через Gemini API...');
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: prompt }]
              }]
            })
          });

          if (!response.ok) throw new Error('Ошибка ответа Gemini API');
          const data = await response.json();
          generatedPostText = data.candidates[0].content.parts[0].text;
          postPreview.textContent = generatedPostText;
          postBtn.disabled = false;
          logConsole('[GEMINI] Пост успешно сгенерирован ИИ.');
        } catch (err) {
          logConsole(`[ОШИБКА GEMINI] Не удалось сгенерировать пост: ${err.message}. Используем локальный шаблон.`);
          fallbackGeneration();
        } finally {
          generateBtn.disabled = false;
        }
      } else {
        logConsole('[SYSTEM] Ключ Gemini API не указан. Используем локальный шаблон генератора.');
        fallbackGeneration();
        generateBtn.disabled = false;
      }
    });

    function fallbackGeneration() {
      generatedPostText = `🔥 **${selectedNewsItem.title}**\n\n${selectedNewsItem.desc}\n\nЧитать подробнее на сайте: ${selectedNewsItem.link}\n\n#автопостинг #habr #новости`;
      postPreview.textContent = generatedPostText;
      postBtn.disabled = false;
      logConsole('[SYSTEM] Локальный пост сгенерирован.');
    }

    postBtn.addEventListener('click', async () => {
      const token = botTokenInput.value;
      const channel = channelIdInput.value;

      if (!token || !channel) {
        logConsole('[ОШИБКА] Заполните Token бота и Channel ID в настройках!');
        return;
      }

      logConsole('[TELEGRAM] Отправка поста в Telegram канал...');
      postBtn.disabled = true;

      try {
        const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            chat_id: channel,
            text: generatedPostText,
            parse_mode: 'Markdown'
          })
        });

        const resData = await response.json();

        if (!response.ok || !resData.ok) {
          throw new Error(resData.description || 'Неизвестная ошибка Telegram API');
        }

        logConsole(`[УСПЕХ] Пост успешно опубликован в канале ${channel}!`);
        alert('Пост успешно опубликован!');
      } catch (err) {
        logConsole(`[ОШИБКА TELEGRAM] Не удалось опубликовать пост: ${err.message}`);
      } finally {
        postBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
